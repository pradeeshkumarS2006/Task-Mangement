<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Viewer</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

    
<body>
    <div class = "navbar">

     <center>
    <h1>TASKS Mangement📚</h1>
    </center>
    </div>
    

    <div class = "container">
        <div class = "book-container">
            <h2>Sample Task</h2>
            <h3>15-06-2026</h3>
             <p>This is a demo task card </p>
                <button onclick = "deletebook(event)">Delete</button>
        </div>
        
    </div>
    
        
       <div class = "popup-overlay"></div>
         <div class = "popup-box">
             <h2>Add Book</h2>
             <form>
                <input type = "text" placeholder = "Task Title" id = "task-title-input">
                <input type = "date" id = "task-date-input">
                <input type = "time" id = "task-time-input">
                <textarea placeholder=" Description" id = "task-description-input"></textarea>
                <button id = "add-task">ADD</button>
                <button id = "canccel-popup">CANCEL</button>
             </form>
         </div>
    <button class = "add-button" id = "add-popup-button">+</button>

    <script src="script.js"></script>

</body>

</html>
